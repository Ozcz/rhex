<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Rhex</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.screen{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px}
.screen.active{display:flex}
h1{font-size:3em;color:#4ecdc4;letter-spacing:.15em;text-shadow:0 0 30px #4ecdc455}
.subtitle{color:#888;font-size:1.1em}
button{background:#4ecdc4;color:#0a0a1a;border:none;padding:12px 28px;border-radius:8px;font-size:1em;font-weight:700;cursor:pointer;transition:all .2s}
button:hover{background:#45b7b0;transform:scale(1.03)}
button:disabled{background:#333;color:#666;cursor:default;transform:none}
.link-box{display:flex;gap:8px;width:100%;max-width:400px}
.link-box input{flex:1;background:#1a1a2e;border:1px solid #333;color:#e0e0e0;padding:10px;border-radius:6px;font-size:.9em}
.waiting{color:#888;margin-top:8px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.setup-header{text-align:center;margin-bottom:12px}
.timer{font-size:2em;color:#ff6;font-weight:700;font-variant-numeric:tabular-nums}
.unit-cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin:12px 0}
.unit-card{background:#1a1a2e;border:2px solid #333;border-radius:12px;padding:16px;width:160px;text-align:center}
.unit-card .unit-label{font-weight:700;margin-bottom:10px;font-size:1.1em}
.unit-card.p1 .unit-label{color:#4ecdc4}
.unit-card.p2 .unit-label{color:#e85d75}
.skill-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.skill-btn{padding:8px 4px;font-size:.75em;border-radius:6px;background:#252540;color:#ccc;border:2px solid transparent}
.skill-btn:hover{background:#353560;transform:none}
.skill-btn.selected{border-color:#4ecdc4;background:#1a3a3a;color:#4ecdc4}
.game-hud{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:#111;border-bottom:1px solid #222;width:100%;flex-shrink:0}
.score{font-size:1.4em;font-weight:700;min-width:60px}
.score.p1{color:#4ecdc4;text-align:left}
.score.p2{color:#e85d75;text-align:right}
.phase-info{text-align:center}
.phase-label{font-size:.85em;color:#888;text-transform:uppercase;letter-spacing:.1em}
canvas{flex:1;width:100%;display:block;touch-action:none}
.action-panel{background:#111;border-top:1px solid #222;padding:8px 16px;width:100%;flex-shrink:0}
.action-queue{display:flex;gap:6px;margin-bottom:8px;min-height:36px;flex-wrap:wrap}
.action-tag{background:#252540;padding:6px 12px;border-radius:6px;font-size:.8em;display:flex;align-items:center;gap:6px;cursor:pointer}
.action-tag:hover{background:#353560}
.action-tag .num{color:#4ecdc4;font-weight:700}
.action-btns{display:flex;gap:8px;justify-content:center}
.action-btns button{padding:8px 16px;font-size:.85em}
#btnSkill{background:#8b6914}
#btnSkill:hover{background:#a07a1a}
#btnUndo{background:#555}
#btnUndo:hover{background:#666}
.ready-btn{background:#2ecc71!important}
.ready-btn:hover{background:#27ae60!important}
.ready-btn.is-ready{background:#e74c3c!important}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:10}
.overlay-text{font-size:2em;font-weight:700;color:#ff6;text-align:center;animation:pulse 1s infinite}
.skill-target-hint{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#333;padding:10px 20px;border-radius:8px;color:#ff6;font-size:.9em;z-index:5}
.status-msg{color:#888;font-size:.9em;text-align:center}
#screenGameover{gap:20px}
#screenGameover h2{font-size:2.5em;color:#ff6}
#finalScore{font-size:1.2em;color:#aaa}
</style>
</head>
<body>

<div id="lobby" class="screen active">
  <h1>RHEX</h1>
  <p class="subtitle">Hex Strategy</p>
  <button id="btnCreate">Create Game</button>
  <button id="btnSolo" style="background:#8b6914">Test Solo</button>
  <div id="shareArea" hidden>
    <p>Share this link with a friend:</p>
    <div class="link-box">
      <input id="shareLink" readonly>
      <button id="btnCopy">Copy</button>
    </div>
    <p class="waiting">Waiting for opponent...</p>
  </div>
  <div id="joinArea" hidden>
    <p class="waiting">Connecting to game...</p>
  </div>
</div>

<div id="screenSetup" class="screen">
  <div class="setup-header">
    <h2>Choose Skills</h2>
    <div class="timer" id="setupTimer">60</div>
  </div>
  <div class="unit-cards" id="unitCards"></div>
  <p class="status-msg" id="setupStatus"></p>
  <button id="btnSetupReady" class="ready-btn">Ready</button>
</div>

<div id="screenGame" class="screen">
  <div class="game-hud">
    <div class="score p1">P1: <span id="scoreP1">0</span></div>
    <div class="phase-info">
      <div class="phase-label" id="phaseLabel">Planning</div>
      <div class="timer" id="gameTimer">60</div>
    </div>
    <div class="score p2">P2: <span id="scoreP2">0</span></div>
  </div>
  <canvas id="board"></canvas>
  <div class="action-panel">
    <div class="action-queue" id="actionQueue"></div>
    <div class="action-btns">
      <button id="btnSkill" hidden>Use Skill</button>
      <button id="btnUndo">Undo</button>
      <button id="btnGameReady" class="ready-btn">Ready</button>
    </div>
  </div>
</div>

<div id="screenGameover" class="screen">
  <h2 id="winText"></h2>
  <div id="finalScore"></div>
  <button id="btnRematch">Play Again</button>
</div>

<div id="overlay" class="overlay" hidden>
  <div class="overlay-text" id="overlayText"></div>
</div>
<div id="skillHint" class="skill-target-hint" hidden></div>

<script>
(function(){
'use strict';

// ===== CONFIG =====
const HEX = 40;
const RAD = 2;
const TIMER_S = 60;
const WIN_DIFF = 6;
const P1_COLOR = '#4ecdc4';
const P2_COLOR = '#e85d75';
const ROW_VALS = [0,1,2,3,6];
const SKILL_DEF = {
  shield:{name:'Shield',desc:'Block 1 attack',icon:'SH',targeted:false,once:false},
  bow:{name:'Bow',desc:'Arrow 2 tiles',icon:'BW',targeted:'direction',once:false},
  hoe:{name:'Hoe',desc:'+1 pt this tile',icon:'HO',targeted:false,once:false},
  trap:{name:'Trap',desc:'Hidden trap adj.',icon:'TR',targeted:'adjacent',once:true},
  cloak:{name:'Cloak',desc:'Stealth, 0 pts',icon:'CL',targeted:false,once:false},
  decoy:{name:'Decoy',desc:'Swap w/ ally',icon:'DC',targeted:'ally',once:true}
};
const DIRS = [{q:1,r:0},{q:-1,r:0},{q:0,r:1},{q:0,r:-1},{q:1,r:-1},{q:-1,r:1}];

// ===== HEX MATH =====
const S3 = Math.sqrt(3);
function hexToPixelRaw(q,r){return{x:HEX*(S3*q+S3/2*r),y:HEX*(1.5*r)}}
function pixelToHexRaw(x,y){
  const q=(S3/3*x-y/3)/HEX, r=(2/3*y)/HEX;
  return hexRound(q,r);
}
function hexRound(q,r){
  let s=-q-r, rq=Math.round(q),rr=Math.round(r),rs=Math.round(s);
  const dq=Math.abs(rq-q),dr=Math.abs(rr-r),ds=Math.abs(rs-s);
  if(dq>dr&&dq>ds)rq=-rr-rs;else if(dr>ds)rr=-rq-rs;
  return{q:rq,r:rr};
}
function onBoard(q,r){return Math.abs(q)<=RAD&&Math.abs(r)<=RAD&&Math.abs(q+r)<=RAD}
function hKey(q,r){return q+','+r}
function neighbors(q,r){return DIRS.map(d=>({q:q+d.q,r:r+d.r})).filter(h=>onBoard(h.q,h.r))}
function hexDist(a,b){return Math.max(Math.abs(a.q-b.q),Math.abs(a.r-b.r),Math.abs((a.q+a.r)-(b.q+b.r)))}
function rowDist(r,player){return player===1?r+2:2-r}
function pointVal(r,player){return ROW_VALS[rowDist(r,player)]}

// ===== BOARD =====
const boardHexes = [];
for(let r=-RAD;r<=RAD;r++)for(let q=-RAD;q<=RAD;q++)if(onBoard(q,r))boardHexes.push({q,r});
function spawnRow(p){return p===1?-2:2}
function spawnHexes(p){return boardHexes.filter(h=>h.r===spawnRow(p))}

// ===== GAME STATE =====
let G = {
  phase:'lobby',myPlayer:0,
  units:[],traps:[],
  scores:[0,0,0],
  myActions:[],opActions:null,
  myReady:false,opReady:false,
  selectedUnit:null,actionMode:null,skillDir:null,
  timerVal:0,timerH:null,
  winner:0,turnNum:0
};
let peer=null,conn=null;
let canvas,ctx,cw,ch,dpr,centerX,centerY;

function initUnits(){
  G.units=[];
  spawnHexes(1).forEach((h,i)=>G.units.push({id:'p1-'+i,player:1,q:h.q,r:h.r,skill:null,dead:false,cloaked:false,hoeBonus:0,shielded:false,trapUsed:false,decoyUsed:false}));
  spawnHexes(2).forEach((h,i)=>G.units.push({id:'p2-'+i,player:2,q:h.q,r:h.r,skill:null,dead:false,cloaked:false,hoeBonus:0,shielded:false,trapUsed:false,decoyUsed:false}));
  G.traps=[];G.scores=[0,0,0];G.turnNum=0;G.winner=0;
}

function myUnits(){return G.units.filter(u=>u.player===G.myPlayer)}
function opUnits(){return G.units.filter(u=>u.player!==G.myPlayer)}
function unitAt(q,r){return G.units.find(u=>!u.dead&&u.q===q&&u.r===r)}
function unitById(id){return G.units.find(u=>u.id===id)}

// ===== SCREEN MANAGEMENT =====
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== RENDERING =====
function hexToScreen(q,r){
  const raw=hexToPixelRaw(q,r);
  const flip=G.myPlayer===2?-1:1;
  return{x:centerX+raw.x*flip,y:centerY+raw.y*flip};
}
function screenToHex(sx,sy){
  const flip=G.myPlayer===2?-1:1;
  return pixelToHexRaw((sx-centerX)*flip,(sy-centerY)*flip);
}

const HEX_COLORS=['#2d4a3e','#3d6b5e','#5a7d4a','#8b7d3c','#b85c2e'];
function hexColor(val){return HEX_COLORS[Math.min(val,4)]}

function drawHexShape(cx,cy,size){
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const a=Math.PI/3*i-Math.PI/6;
    const x=cx+size*Math.cos(a),y=cy+size*Math.sin(a);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
}

function render(){
  ctx.clearRect(0,0,cw,ch);

  // board hexes
  for(const h of boardHexes){
    const s=hexToScreen(h.q,h.r);
    const v=pointVal(h.r,G.myPlayer);
    drawHexShape(s.x,s.y,HEX-2);
    ctx.fillStyle=hexColor(v);ctx.fill();
    ctx.strokeStyle='#1a1a2e';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.font=`${HEX*0.3}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(v,s.x,s.y+HEX*0.28);
  }

  // highlights
  if(G.phase==='planning'&&G.selectedUnit!==null&&G.actionMode==='move'){
    const u=unitById(G.selectedUnit);
    if(u&&!u.dead){
      for(const n of neighbors(u.q,u.r)){
        const occ=unitAt(n.q,n.r);
        if(occ&&occ.player===G.myPlayer)continue;
        const s=hexToScreen(n.q,n.r);
        drawHexShape(s.x,s.y,HEX-4);
        ctx.fillStyle=occ?'rgba(255,80,80,0.3)':'rgba(80,255,80,0.25)';ctx.fill();
      }
    }
  }
  if(G.actionMode==='skill-direction'){
    const u=unitById(G.selectedUnit);
    if(u){
      for(const d of DIRS){
        const tq=u.q+d.q*2,tr=u.r+d.r*2;
        const mid={q:u.q+d.q,r:u.r+d.r};
        for(const t of [mid,{q:tq,r:tr}]){
          if(onBoard(t.q,t.r)){
            const s=hexToScreen(t.q,t.r);
            drawHexShape(s.x,s.y,HEX-4);
            ctx.fillStyle='rgba(255,200,50,0.25)';ctx.fill();
          }
        }
      }
    }
  }
  if(G.actionMode==='skill-adjacent'){
    const u=unitById(G.selectedUnit);
    if(u){
      for(const n of neighbors(u.q,u.r)){
        if(!unitAt(n.q,n.r)){
          const s=hexToScreen(n.q,n.r);
          drawHexShape(s.x,s.y,HEX-4);
          ctx.fillStyle='rgba(255,150,50,0.3)';ctx.fill();
        }
      }
    }
  }
  if(G.actionMode==='skill-ally'){
    for(const a of myUnits()){
      if(!a.dead&&a.id!==G.selectedUnit){
        const s=hexToScreen(a.q,a.r);
        drawHexShape(s.x,s.y,HEX-4);
        ctx.fillStyle='rgba(100,200,255,0.3)';ctx.fill();
      }
    }
  }

  // traps (own only)
  for(const t of G.traps){
    if(t.player!==G.myPlayer)continue;
    const s=hexToScreen(t.q,t.r);
    ctx.fillStyle='rgba(255,150,50,0.5)';
    ctx.font=`${HEX*0.35}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('x',s.x,s.y-HEX*0.1);
  }

  // units
  for(const u of G.units){
    if(u.dead)continue;
    if(u.cloaked&&u.player!==G.myPlayer)continue;
    const s=hexToScreen(u.q,u.r);
    const col=u.player===1?P1_COLOR:P2_COLOR;
    const r=HEX*0.33;

    // selection ring
    if(G.selectedUnit===u.id){
      ctx.beginPath();ctx.arc(s.x,s.y,r+5,0,Math.PI*2);
      ctx.strokeStyle='#ff6';ctx.lineWidth=3;ctx.stroke();
    }

    // body
    ctx.beginPath();ctx.arc(s.x,s.y,r,0,Math.PI*2);
    ctx.fillStyle=u.cloaked?col+'66':col;ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();

    // shield indicator
    if(u.shielded){
      ctx.beginPath();ctx.arc(s.x,s.y,r+3,0,Math.PI*2);
      ctx.strokeStyle='#ff6';ctx.lineWidth=2;ctx.setLineDash([4,3]);ctx.stroke();ctx.setLineDash([]);
    }

    // skill icon
    if(u.skill){
      ctx.fillStyle='#fff';ctx.font=`bold ${HEX*0.25}px sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(SKILL_DEF[u.skill].icon,s.x,s.y);
    }

    // hoe bonus
    if(u.hoeBonus>0){
      ctx.fillStyle='#ff6';ctx.font=`${HEX*0.22}px sans-serif`;
      ctx.fillText('+'+u.hoeBonus,s.x,s.y-r-6);
    }

    // action assigned indicator
    const aIdx=G.myActions.findIndex(a=>a.unitId===u.id);
    if(aIdx>=0&&u.player===G.myPlayer){
      ctx.fillStyle='#ff6';ctx.font=`bold ${HEX*0.22}px sans-serif`;
      ctx.fillText(aIdx+1,s.x+r+4,s.y-r);
    }
  }

  // respawn indicators for dead own units
  if(G.phase==='planning'){
    const deadOwn=myUnits().filter(u=>u.dead);
    if(deadOwn.length>0&&G.actionMode==='respawn'){
      for(const h of spawnHexes(G.myPlayer)){
        if(!unitAt(h.q,h.r)){
          const s=hexToScreen(h.q,h.r);
          drawHexShape(s.x,s.y,HEX-4);
          ctx.fillStyle='rgba(100,255,200,0.3)';ctx.fill();
        }
      }
    }
  }

  requestAnimationFrame(render);
}

// ===== CANVAS SETUP =====
function setupCanvas(){
  canvas=document.getElementById('board');
  ctx=canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize',resizeCanvas);
  canvas.addEventListener('click',onCanvasClick);
  requestAnimationFrame(render);
}
function resizeCanvas(){
  dpr=window.devicePixelRatio||1;
  const rect=canvas.getBoundingClientRect();
  cw=rect.width;ch=rect.height;
  canvas.width=cw*dpr;canvas.height=ch*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  centerX=cw/2;centerY=ch/2;
}

// ===== INPUT =====
function onCanvasClick(e){
  const rect=canvas.getBoundingClientRect();
  const sx=e.clientX-rect.left,sy=e.clientY-rect.top;
  const hex=screenToHex(sx,sy);
  if(!onBoard(hex.q,hex.r))return;

  if(G.phase==='planning')handlePlanClick(hex);
}

function handlePlanClick(hex){
  if(G.myReady)return;
  const clicked=unitAt(hex.q,hex.r);

  // respawn mode
  if(G.actionMode==='respawn'){
    const deadUnit=myUnits().find(u=>u.dead&&!G.myActions.find(a=>a.unitId===u.id));
    if(deadUnit&&hex.r===spawnRow(G.myPlayer)&&!unitAt(hex.q,hex.r)){
      addAction({unitId:deadUnit.id,type:'respawn',target:{q:hex.q,r:hex.r}});
      G.actionMode=null;G.selectedUnit=null;
      hideHint();
    }
    return;
  }

  // skill target modes
  if(G.actionMode==='skill-direction'){
    const u=unitById(G.selectedUnit);
    if(!u)return;
    const dq=hex.q-u.q,dr=hex.r-u.r;
    const dir=DIRS.find(d=>{
      for(let s=1;s<=2;s++)if(u.q+d.q*s===hex.q&&u.r+d.r*s===hex.r)return true;
      return false;
    });
    if(dir){
      addAction({unitId:u.id,type:'skill',skill:'bow',direction:dir});
      G.actionMode=null;G.selectedUnit=null;hideHint();
    }
    return;
  }
  if(G.actionMode==='skill-adjacent'){
    const u=unitById(G.selectedUnit);
    if(u&&neighbors(u.q,u.r).some(n=>n.q===hex.q&&n.r===hex.r)&&!unitAt(hex.q,hex.r)){
      addAction({unitId:u.id,type:'skill',skill:'trap',target:{q:hex.q,r:hex.r}});
      G.actionMode=null;G.selectedUnit=null;hideHint();
    }
    return;
  }
  if(G.actionMode==='skill-ally'){
    const ally=clicked;
    if(ally&&ally.player===G.myPlayer&&!ally.dead&&ally.id!==G.selectedUnit){
      addAction({unitId:G.selectedUnit,type:'skill',skill:'decoy',targetId:ally.id});
      G.actionMode=null;G.selectedUnit=null;hideHint();
    }
    return;
  }

  // move mode
  if(G.actionMode==='move'&&G.selectedUnit){
    const u=unitById(G.selectedUnit);
    if(!u)return;
    const nb=neighbors(u.q,u.r);
    if(nb.some(n=>n.q===hex.q&&n.r===hex.r)){
      const occ=unitAt(hex.q,hex.r);
      if(occ&&occ.player===G.myPlayer)return;
      addAction({unitId:u.id,type:'move',target:{q:hex.q,r:hex.r}});
      G.actionMode=null;G.selectedUnit=null;
    }
    return;
  }

  // select own unit
  if(clicked&&clicked.player===G.myPlayer&&!clicked.dead){
    if(G.myActions.find(a=>a.unitId===clicked.id))return;
    G.selectedUnit=clicked.id;
    G.actionMode='move';
    document.getElementById('btnSkill').hidden=!clicked.skill;
    updateSkillBtn(clicked);
    return;
  }

  // deselect
  G.selectedUnit=null;G.actionMode=null;
  document.getElementById('btnSkill').hidden=true;
  hideHint();
}

function updateSkillBtn(u){
  const btn=document.getElementById('btnSkill');
  if(!u||!u.skill){btn.hidden=true;return;}
  const sd=SKILL_DEF[u.skill];
  if(sd.once&&((u.skill==='trap'&&u.trapUsed)||(u.skill==='decoy'&&u.decoyUsed))){
    btn.hidden=true;return;
  }
  btn.hidden=false;
  btn.textContent=sd.name;
}

function addAction(action){
  if(G.myActions.length>=3)return;
  G.myActions.push(action);
  updateActionQueue();
  autoSelectNext();
}

function autoSelectNext(){
  const assigned=new Set(G.myActions.map(a=>a.unitId));
  const next=myUnits().find(u=>!assigned.has(u.id)&&!u.dead);
  const deadUnassigned=myUnits().find(u=>u.dead&&!assigned.has(u.id));
  if(next){
    G.selectedUnit=next.id;G.actionMode='move';
    document.getElementById('btnSkill').hidden=!next.skill;
    updateSkillBtn(next);
  }else if(deadUnassigned){
    G.selectedUnit=deadUnassigned.id;G.actionMode='respawn';
    showHint('Click a spawn tile to respawn');
  }else{
    G.selectedUnit=null;G.actionMode=null;
    document.getElementById('btnSkill').hidden=true;
  }
}

function updateActionQueue(){
  const aq=document.getElementById('actionQueue');
  aq.innerHTML='';
  G.myActions.forEach((a,i)=>{
    const tag=document.createElement('div');tag.className='action-tag';
    const u=unitById(a.unitId);
    let desc=a.type==='move'?'Move':'';
    if(a.type==='skill')desc=SKILL_DEF[a.skill].name;
    if(a.type==='respawn')desc='Respawn';
    tag.innerHTML=`<span class="num">${i+1}</span> ${u?u.skill?SKILL_DEF[u.skill].icon:'U':'?'}: ${desc}`;
    tag.onclick=()=>undoAction(i);
    aq.appendChild(tag);
  });
}

function undoAction(idx){
  G.myActions.splice(idx);
  updateActionQueue();
  autoSelectNext();
}

function showHint(msg){const el=document.getElementById('skillHint');el.textContent=msg;el.hidden=false;}
function hideHint(){document.getElementById('skillHint').hidden=true;}

// ===== SKILL BUTTON =====
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('btnSkill').addEventListener('click',()=>{
    const u=unitById(G.selectedUnit);
    if(!u||!u.skill)return;
    const sd=SKILL_DEF[u.skill];
    if(sd.targeted==='direction'){
      G.actionMode='skill-direction';
      showHint('Click a hex in the direction to fire');
    }else if(sd.targeted==='adjacent'){
      G.actionMode='skill-adjacent';
      showHint('Click an adjacent empty hex for trap');
    }else if(sd.targeted==='ally'){
      G.actionMode='skill-ally';
      showHint('Click an ally unit to swap with');
    }else{
      addAction({unitId:u.id,type:'skill',skill:u.skill});
      G.actionMode=null;G.selectedUnit=null;hideHint();
    }
  });
});

// ===== TIMER =====
function startTimer(sec,onTick,onDone){
  clearInterval(G.timerH);
  G.timerVal=sec;
  onTick(G.timerVal);
  G.timerH=setInterval(()=>{
    G.timerVal--;
    onTick(G.timerVal);
    if(G.timerVal<=0){clearInterval(G.timerH);onDone();}
  },1000);
}
function stopTimer(){clearInterval(G.timerH);}

// ===== SETUP PHASE =====
function startSetup(){
  G.phase='setup';G.myReady=false;G.opReady=false;
  initUnits();
  showScreen('screenSetup');
  buildSetupUI();
  startTimer(TIMER_S,
    v=>document.getElementById('setupTimer').textContent=v,
    ()=>finishSetup()
  );
}

function buildSetupUI(){
  const container=document.getElementById('unitCards');
  container.innerHTML='';
  const mine=myUnits();
  mine.forEach((u,i)=>{
    const card=document.createElement('div');
    card.className='unit-card '+(G.myPlayer===1?'p1':'p2');
    let html=`<div class="unit-label">Unit ${i+1}</div><div class="skill-grid">`;
    for(const[key,sd]of Object.entries(SKILL_DEF)){
      html+=`<button class="skill-btn" data-uid="${u.id}" data-skill="${key}">${sd.icon} ${sd.name}</button>`;
    }
    html+='</div>';
    card.innerHTML=html;
    container.appendChild(card);
  });
  container.addEventListener('click',e=>{
    const btn=e.target.closest('.skill-btn');
    if(!btn)return;
    const uid=btn.dataset.uid,skill=btn.dataset.skill;
    const u=unitById(uid);if(!u)return;
    u.skill=skill;
    container.querySelectorAll(`.skill-btn[data-uid="${uid}"]`).forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
  });
  document.getElementById('btnSetupReady').onclick=()=>finishSetup();
  document.getElementById('setupStatus').textContent='';
}

function finishSetup(){
  if(G.myReady)return;
  myUnits().forEach(u=>{if(!u.skill)u.skill='shield';});
  G.myReady=true;
  stopTimer();
  document.getElementById('setupStatus').textContent='Waiting for opponent...';
  document.getElementById('btnSetupReady').disabled=true;
  send({type:'setup-done',units:myUnits().map(u=>({id:u.id,q:u.q,r:u.r,skill:u.skill}))});
  if(G.opReady)startPlanning();
}

// ===== PLANNING PHASE =====
function startPlanning(){
  G.phase='planning';G.myReady=false;G.opReady=false;
  G.myActions=[];G.opActions=null;G.selectedUnit=null;G.actionMode=null;
  G.units.forEach(u=>{u.shielded=false;});
  showScreen('screenGame');
  setupCanvas();
  document.getElementById('phaseLabel').textContent='Planning';
  document.getElementById('btnGameReady').disabled=false;
  document.getElementById('btnGameReady').classList.remove('is-ready');
  document.getElementById('btnGameReady').textContent='Ready';
  document.getElementById('btnSkill').hidden=true;
  updateActionQueue();
  updateScoreDisplay();
  autoSelectNext();
  startTimer(TIMER_S,
    v=>document.getElementById('gameTimer').textContent=v,
    ()=>submitPlan()
  );
  document.getElementById('btnGameReady').onclick=()=>submitPlan();
  document.getElementById('btnUndo').onclick=()=>{
    if(G.myActions.length>0){G.myActions.pop();updateActionQueue();autoSelectNext();}
  };
}

function submitPlan(){
  if(G.myReady)return;
  G.myReady=true;
  stopTimer();
  document.getElementById('btnGameReady').disabled=true;
  document.getElementById('btnGameReady').classList.add('is-ready');
  document.getElementById('btnGameReady').textContent='Waiting...';
  G.selectedUnit=null;G.actionMode=null;hideHint();
  send({type:'plan-done',actions:G.myActions});
  if(G.opActions)runResolution();
}

// ===== RESOLUTION =====
async function runResolution(){
  G.phase='resolution';
  document.getElementById('phaseLabel').textContent='Resolving...';
  showOverlay('Resolving...');

  const p1Acts=G.myPlayer===1?G.myActions:G.opActions;
  const p2Acts=G.myPlayer===2?G.myActions:G.opActions;

  for(let step=0;step<3;step++){
    const a1=p1Acts[step]||null;
    const a2=p2Acts[step]||null;
    resolveStep(a1,a2);
    await sleep(1200);
  }

  G.turnNum++;
  calcScores();
  updateScoreDisplay();
  hideOverlay();

  if(checkWin()){
    G.phase='gameover';
    showScreen('screenGameover');
    const w=G.winner;
    document.getElementById('winText').textContent=w===G.myPlayer?'You Win!':'You Lose!';
    document.getElementById('finalScore').textContent=`Score: P1 ${G.scores[1]} - P2 ${G.scores[2]}`;
    document.getElementById('btnRematch').onclick=()=>{
      send({type:'rematch'});startSetup();
    };
  }else{
    startPlanning();
  }
}

function resolveStep(a1,a2){
  const actions=[];
  if(a1)actions.push({...a1,player:1});
  if(a2)actions.push({...a2,player:2});

  // Respawns first
  for(const a of actions){
    if(a.type==='respawn'){
      const u=unitById(a.unitId);
      if(u&&u.dead&&!unitAt(a.target.q,a.target.r)){
        u.dead=false;u.q=a.target.q;u.r=a.target.r;
        u.cloaked=false;u.hoeBonus=0;u.shielded=false;
      }
    }
  }

  const movers=actions.filter(a=>a.type==='move');
  const skillers=actions.filter(a=>a.type==='skill');

  // Activate shields first (they're defensive)
  for(const a of skillers){
    if(a.skill==='shield'){
      const u=unitById(a.unitId);
      if(u&&!u.dead)u.shielded=true;
    }
  }

  // Check move collisions
  if(movers.length===2&&movers[0].target.q===movers[1].target.q&&movers[0].target.r===movers[1].target.r){
    // Both going to same hex - cancel both
  }else if(movers.length===2){
    const u0=unitById(movers[0].unitId),u1=unitById(movers[1].unitId);
    // Head-on check
    if(u0&&u1&&movers[0].target.q===u1.q&&movers[0].target.r===u1.r&&movers[1].target.q===u0.q&&movers[1].target.r===u0.r){
      // Head-on swap collision - both cancel
    }else{
      // Process each move
      for(const m of movers)processMove(m);
    }
  }else{
    for(const m of movers)processMove(m);
  }

  // Process skills (non-shield)
  for(const a of skillers){
    const u=unitById(a.unitId);
    if(!u||u.dead)continue;
    switch(a.skill){
      case 'bow': resolveBow(u,a.direction);break;
      case 'hoe': u.hoeBonus++;break;
      case 'trap':
        if(!u.trapUsed){
          G.traps.push({q:a.target.q,r:a.target.r,player:u.player});
          u.trapUsed=true;
        }
        break;
      case 'cloak': u.cloaked=!u.cloaked;if(u.cloaked)u.hoeBonus=0;break;
      case 'decoy':
        if(!u.decoyUsed){
          const ally=unitById(a.targetId);
          if(ally&&!ally.dead){
            const tq=u.q,tr=u.r;
            u.q=ally.q;u.r=ally.r;
            ally.q=tq;ally.r=tr;
            u.decoyUsed=true;
          }
        }
        break;
    }
  }

  // Check traps after all movement
  for(const u of G.units){
    if(u.dead)continue;
    const trap=G.traps.find(t=>t.q===u.q&&t.r===u.r&&t.player!==u.player);
    if(trap){
      if(u.shielded){u.shielded=false;}
      else{u.dead=true;u.hoeBonus=0;u.cloaked=false;}
      G.traps=G.traps.filter(t=>t!==trap);
    }
  }
}

function processMove(m){
  const u=unitById(m.unitId);
  if(!u||u.dead)return;
  const target=m.target;
  const enemy=unitAt(target.q,target.r);
  if(enemy&&enemy.player!==u.player){
    if(enemy.shielded){enemy.shielded=false;return;}
    enemy.dead=true;enemy.hoeBonus=0;enemy.cloaked=false;
  }else if(enemy&&enemy.player===u.player){
    return;
  }
  u.q=target.q;u.r=target.r;
  u.cloaked=false;
  if(u.hoeBonus>0)u.hoeBonus=0;
}

function resolveBow(u,dir){
  if(!dir)return;
  for(let s=1;s<=2;s++){
    const tq=u.q+dir.q*s,tr=u.r+dir.r*s;
    if(!onBoard(tq,tr))break;
    const target=unitAt(tq,tr);
    if(target&&target.player!==u.player){
      if(target.shielded){target.shielded=false;}
      else{target.dead=true;target.hoeBonus=0;target.cloaked=false;}
      return;
    }
    if(target&&target.player===u.player)return;
  }
}

// ===== SCORING =====
function calcScores(){
  G.scores[1]=0;G.scores[2]=0;
  for(const u of G.units){
    if(u.dead||u.cloaked)continue;
    const v=pointVal(u.r,u.player)+u.hoeBonus;
    G.scores[u.player]+=v;
  }
}
function updateScoreDisplay(){
  document.getElementById('scoreP1').textContent=G.scores[1];
  document.getElementById('scoreP2').textContent=G.scores[2];
}
function checkWin(){
  const diff=Math.abs(G.scores[1]-G.scores[2]);
  if(diff>=WIN_DIFF){
    G.winner=G.scores[1]>G.scores[2]?1:2;
    return true;
  }
  return false;
}

// ===== NETWORKING =====
function createGame(){
  const roomId=Math.random().toString(36).substr(2,6).toUpperCase();
  peer=new Peer('rhex-'+roomId,{debug:0});
  peer.on('open',()=>{
    const url=location.origin+location.pathname+'?room='+roomId;
    document.getElementById('shareLink').value=url;
    document.getElementById('shareArea').hidden=false;
    document.getElementById('btnCreate').hidden=true;
  });
  peer.on('connection',c=>{
    conn=c;G.myPlayer=1;
    wireConn();
    send({type:'welcome',player:2});
    startSetup();
  });
  peer.on('error',e=>console.error('Peer error:',e));
}

function joinGame(roomId){
  document.getElementById('btnCreate').hidden=true;
  document.getElementById('joinArea').hidden=false;
  peer=new Peer(undefined,{debug:0});
  peer.on('open',()=>{
    conn=peer.connect('rhex-'+roomId,{reliable:true});
    conn.on('open',()=>{wireConn();});
  });
  peer.on('error',e=>console.error('Peer error:',e));
}

function wireConn(){
  conn.on('data',onMessage);
  conn.on('close',()=>showOverlay('Opponent disconnected'));
}

let sendFn=function(data){
  if(conn&&conn.open)conn.send(data);
};
function send(data){sendFn(data);}

function onMessage(data){
  switch(data.type){
    case 'welcome':
      G.myPlayer=data.player;
      startSetup();
      break;
    case 'setup-done':
      for(const ud of data.units){
        const u=unitById(ud.id);
        if(u){u.skill=ud.skill;u.q=ud.q;u.r=ud.r;}
      }
      G.opReady=true;
      if(G.myReady)startPlanning();
      break;
    case 'plan-done':
      G.opActions=data.actions;
      G.opReady=true;
      if(G.myReady)runResolution();
      break;
    case 'rematch':
      startSetup();
      break;
  }
}

// ===== HELPERS =====
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function showOverlay(msg){
  document.getElementById('overlayText').textContent=msg;
  document.getElementById('overlay').hidden=false;
}
function hideOverlay(){document.getElementById('overlay').hidden=true;}

// ===== SOLO TEST MODE =====
let soloMode=false;
function startSolo(){
  soloMode=true;G.myPlayer=1;
  sendFn=function(data){
    if(data.type==='setup-done'){
      // auto-assign skills to opponent
      opUnits().forEach(u=>{u.skill=u.skill||'shield';});
      G.opReady=true;
      if(G.myReady)startPlanning();
    }else if(data.type==='plan-done'){
      // auto-generate opponent actions: each unit moves forward if possible
      const opActs=[];
      for(const u of opUnits()){
        if(u.dead)continue;
        const fwd=neighbors(u.q,u.r).filter(n=>{
          const d=rowDist(n.r,2);
          return d>rowDist(u.r,2)&&!unitAt(n.q,n.r);
        });
        if(fwd.length>0){
          opActs.push({unitId:u.id,type:'move',target:fwd[0]});
        }
      }
      G.opActions=opActs;G.opReady=true;
      if(G.myReady)runResolution();
    }
  };
  startSetup();
}

// ===== INIT =====
function init(){
  const params=new URLSearchParams(location.search);
  const room=params.get('room');
  if(room){
    joinGame(room);
  }else{
    document.getElementById('btnCreate').onclick=createGame;
    document.getElementById('btnSolo').onclick=startSolo;
  }
  document.getElementById('btnCopy').onclick=()=>{
    const inp=document.getElementById('shareLink');
    inp.select();navigator.clipboard.writeText(inp.value).catch(()=>{});
  };
}

document.addEventListener('DOMContentLoaded',init);

})();
</script>
